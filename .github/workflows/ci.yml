name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: corepack enable

      - run: corepack yarn install --frozen-lockfile

      - name: Lint
        run: corepack yarn lint

      - name: Typecheck
        run: corepack yarn typecheck

      - name: Build
        run: corepack yarn build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: corepack enable

      - run: corepack yarn install --frozen-lockfile

      - name: Test
        run: corepack yarn test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: corepack enable

      - run: corepack yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: corepack yarn playwright install --with-deps chromium

      - name: Prepare E2E env
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "E2E_SKIPPED=1" >> "$GITHUB_ENV"
            echo "Skipping E2E because Supabase secrets are not configured yet."
            exit 0
          fi
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
          } > .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: E2E Test
        if: env.E2E_SKIPPED != '1'
        run: |
          corepack yarn test:e2e tests/smoke-unauth.spec.ts tests/smoke-auth.spec.ts tests/navigation.spec.ts --workers=1
          corepack yarn test:e2e tests/workspaces.spec.ts --workers=1
          corepack yarn test:e2e tests/settings.spec.ts --workers=1
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
